<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🐾 狗狗散步日誌</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyAsa3K7FLUSRlIM9aRuP6piBl9OUvTwUqY",
    authDomain: "dog-walk-log.firebaseapp.com",
    databaseURL: "https://dog-walk-log-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dog-walk-log",
    storageBucket: "dog-walk-log.firebasestorage.app",
    messagingSenderId: "842615655439",
    appId: "1:842615655439:web:c5a915986798e8ffade77a"
  });
  const db = firebase.database();
</script>
<style>
  :root {
    --bg:#FFF8F0;--card:#fff;--amber:#F59E0B;--amber-light:#FEF3C7;--amber-dark:#D97706;
    --green:#10B981;--green-light:#D1FAE5;--blue:#3B82F6;--blue-light:#DBEAFE;
    --red:#EF4444;--red-light:#FEE2E2;--purple:#8B5CF6;--purple-light:#EDE9FE;
    --text:#1C1917;--text-muted:#78716C;--border:#E7E5E4;
    --shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 30px rgba(0,0,0,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'Noto Sans TC',sans-serif;color:var(--text);min-height:100vh;padding-bottom:48px;}

  /* HEADER */
  .header{background:linear-gradient(135deg,#F59E0B,#EF7C00);padding:20px 20px 60px;position:relative;overflow:hidden;}
  .header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,.12);border-radius:50%;}
  .header::after{content:'';position:absolute;bottom:-20px;left:30%;width:100px;height:100px;background:rgba(255,255,255,.08);border-radius:50%;}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
  .dog-name{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.15);}
  .dog-emoji{font-size:36px;}
  .date-badge{background:rgba(255,255,255,.25);color:#fff;font-size:13px;font-weight:700;padding:6px 12px;border-radius:20px;backdrop-filter:blur(4px);}
  .stats-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .stat-pill{background:rgba(255,255,255,.25);backdrop-filter:blur(4px);color:#fff;font-size:12px;font-weight:700;padding:6px 12px;border-radius:20px;display:flex;align-items:center;gap:5px;}

  .main{margin:-32px 16px 0;position:relative;z-index:10;}

  /* SYNC BANNER */
  .sync-banner{background:var(--blue-light);border:1.5px solid var(--blue);border-radius:12px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;font-size:13px;color:#1E40AF;font-weight:500;line-height:1.5;}
  .sync-banner .icon{font-size:18px;flex-shrink:0;margin-top:1px;}

  /* ROUTE PLANNER */
  .route-card{background:var(--card);border-radius:20px;padding:16px;box-shadow:var(--shadow-lg);margin-bottom:16px;}
  .route-card-title{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .place-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .place-btn{padding:14px 10px;border:2px solid var(--border);border-radius:14px;background:#fff;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;transition:all .15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .place-btn:active{transform:scale(.96);}
  .place-btn.selected{border-color:var(--green);background:var(--green-light);color:#065F46;}
  .place-btn .place-icon{font-size:22px;}
  .place-btn .place-label{font-size:12px;}
  .route-sequence{min-height:44px;background:#F5F5F4;border-radius:12px;padding:10px 12px;margin-bottom:10px;display:flex;flex-wrap:wrap;align-items:center;gap:6px;}
  .route-sequence-empty{font-size:13px;color:var(--text-muted);}
  .seq-chip{display:flex;align-items:center;gap:4px;background:#fff;border:1.5px solid var(--green);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;color:#065F46;}
  .seq-arrow{font-size:14px;color:var(--text-muted);}
  .route-clear-btn{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;}
  .route-clear-btn:active{background:var(--red-light);color:var(--red);border-color:var(--red);}
  .entry-route-sequence{margin-top:8px;background:#F0FDF4;border-radius:8px;padding:8px 10px;font-size:12px;color:#065F46;font-weight:600;display:flex;flex-wrap:wrap;align-items:center;gap:4px;}

  /* ADD BUTTON */
  .add-btn{width:100%;background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none;border-radius:18px;padding:18px;font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 20px rgba(16,185,129,.35);transition:all .2s;margin-bottom:16px;}
  .add-btn:active{transform:scale(.97);}

  /* FORM CARD */
  .form-card{background:var(--card);border-radius:20px;padding:20px;box-shadow:var(--shadow-lg);margin-bottom:20px;display:none;}
  .form-card.open{display:block;animation:slideDown .2s ease;}
  @keyframes slideDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
  .form-title{font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;margin-bottom:16px;}
  .section-label{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
  .toggle-group{display:flex;gap:8px;margin-bottom:16px;}
  .toggle-btn{flex:1;padding:10px 6px;border:2px solid var(--border);border-radius:12px;background:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;transition:all .15s;text-align:center;}
  .toggle-btn.active{border-color:var(--amber);background:var(--amber-light);color:var(--amber-dark);}

  /* TIME OF DAY */
  .time-toggle-group{display:flex;gap:8px;margin-bottom:16px;}
  .time-btn{flex:1;padding:12px 4px;border:2px solid var(--border);border-radius:14px;background:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;transition:all .15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .time-btn .t-icon{font-size:20px;}
  .time-btn.morning.active{border-color:#F59E0B;background:#FEF3C7;color:#92400E;}
  .time-btn.evening.active{border-color:#F97316;background:#FFEDD5;color:#C2410C;}
  .time-btn.night.active{border-color:#6366F1;background:#EEF2FF;color:#4338CA;}

  .note-input{width:100%;border:2px solid var(--border);border-radius:12px;padding:12px 14px;font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--text);resize:none;outline:none;transition:border-color .15s;margin-bottom:14px;background:#fff;}
  .note-input:focus{border-color:var(--amber);}
  .submit-btn{width:100%;background:linear-gradient(135deg,var(--amber),var(--amber-dark));color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(245,158,11,.35);transition:all .2s;}
  .submit-btn:active{transform:scale(.98);}

  .attach-route-box{background:#F0FDF4;border:1.5px solid var(--green);border-radius:10px;padding:10px 12px;font-size:13px;color:#065F46;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:16px;}

  /* SUMMARY */
  .today-summary{background:#fff;border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:20px;display:flex;gap:12px;}
  .summary-item{flex:1;text-align:center;padding:12px 8px;border-radius:12px;}
  .summary-item.pee-summary{background:var(--amber-light);}
  .summary-item.poop-summary{background:#FEF3C7;}
  .summary-num{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;line-height:1;margin-bottom:4px;}
  .summary-item.pee-summary .summary-num{color:var(--amber-dark);}
  .summary-item.poop-summary .summary-num{color:#92400E;}
  .summary-label{font-size:12px;font-weight:700;color:var(--text-muted);}

  /* TABS */
  .tabs{display:flex;background:#F0EDE8;border-radius:14px;padding:4px;margin-bottom:16px;}
  .tab{flex:1;padding:8px;border:none;background:transparent;border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;transition:all .15s;}
  .tab.active{background:#fff;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08);}

  /* LOG ENTRIES */
  .log-entry{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border-left:4px solid transparent;animation:fadeIn .3s ease;position:relative;}
  @keyframes fadeIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}
  .log-entry.by-me{border-left-color:var(--amber);}
  .log-entry.by-wife{border-left-color:var(--purple);}
  .log-entry.by-both{border-left-color:var(--green);}
  .entry-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .entry-who{display:flex;align-items:center;gap:8px;}
  .who-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;}
  .who-avatar.me{background:var(--amber-light);color:var(--amber-dark);}
  .who-avatar.wife{background:var(--purple-light);color:var(--purple);}
  .who-avatar.both{background:var(--green-light);color:#065F46;}
  .who-name{font-size:14px;font-weight:700;}
  .entry-time{font-size:12px;color:var(--text-muted);}
  .badge-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
  .badge{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;}
  .badge.pee{background:var(--amber-light);color:var(--amber-dark);}
  .badge.poop{background:#FEF3C7;color:#92400E;}
  .badge.normal{background:var(--green-light);color:#065F46;}
  .badge.abnormal{background:var(--red-light);color:#991B1B;}
  .badge.morning{background:#FEF3C7;color:#92400E;}
  .badge.evening{background:#FFEDD5;color:#C2410C;}
  .badge.night{background:#EEF2FF;color:#4338CA;}
  .entry-note{font-size:13px;color:var(--text-muted);background:#F5F5F4;border-radius:8px;padding:8px 10px;margin-top:4px;}
  .entry-route-btn{margin-top:8px;font-size:12px;color:var(--blue);font-weight:700;background:var(--blue-light);border:none;border-radius:8px;padding:5px 10px;cursor:pointer;}
  .entry-route-map{height:160px;border-radius:10px;overflow:hidden;display:none;border:2px solid var(--blue);margin-top:6px;}
  .delete-btn{position:absolute;top:12px;right:12px;background:none;border:none;font-size:16px;cursor:pointer;opacity:.3;transition:opacity .15s;padding:2px 6px;}
  .delete-btn:active{opacity:1;}
  .empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);}
  .empty-state .big{font-size:48px;margin-bottom:12px;}
  .empty-state p{font-size:14px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="dog-name">🐾 狗狗日誌</div>
      <div class="date-badge" id="todayDate"></div>
    </div>
    <div class="dog-emoji">🐕</div>
  </div>
  <div class="stats-row">
    <div class="stat-pill">💧 <span id="headerPee">0</span> 次尿尿</div>
    <div class="stat-pill">💩 <span id="headerPoop">0</span> 次便便</div>
    <div class="stat-pill" id="lastUpdatedPill">尚無紀錄</div>
  </div>
</div>

<div class="main">

  <div class="sync-banner">
    <span class="icon">🔥</span>
    <div>已連接 Firebase，與太太的資料<b>即時雙向同步</b>。將網址分享給太太，兩人開啟同一連結即可。</div>
  </div>

  <!-- Route Planner Card -->
  <div class="route-card">
    <div class="route-card-title">📍 今日路線規劃</div>
    <div class="section-label">點選地點（可重複、可折返）</div>
    <div class="place-grid">
      <button class="place-btn" onclick="addPlace('A','狗狗公園')"><span class="place-icon">🐾</span><span class="place-label">狗狗公園</span></button>
      <button class="place-btn" onclick="addPlace('B','康寧國小正門')"><span class="place-icon">🏫</span><span class="place-label">康寧國小正門</span></button>
      <button class="place-btn" onclick="addPlace('C','康寧國小側門')"><span class="place-icon">🚪</span><span class="place-label">康寧國小側門</span></button>
      <button class="place-btn" onclick="addPlace('D','大笨鳥公園')"><span class="place-icon">🌳</span><span class="place-label">大笨鳥公園</span></button>
      <button class="place-btn" onclick="addPlace('E','警智新村')"><span class="place-icon">🏘️</span><span class="place-label">警智新村</span></button>
      <button class="place-btn" onclick="addPlace('F','康寧國小後山')"><span class="place-icon">⛰️</span><span class="place-label">康寧國小後山</span></button>
    </div>
    <div class="section-label">目前路線順序</div>
    <div class="route-sequence" id="routeSequence">
      <span class="route-sequence-empty">點選上方地點來建立路線</span>
    </div>
    <button class="route-clear-btn" onclick="clearRoute()">🗑️ 清除路線</button>
  </div>

  <!-- Add -->
  <button class="add-btn" onclick="toggleForm()">＋ 記錄遛狗</button>

  <!-- Form -->
  <div class="form-card" id="formCard">
    <div class="form-title">📝 新增遛狗紀錄</div>

    <div class="section-label">誰帶牠出去？</div>
    <div class="toggle-group">
      <button class="toggle-btn active" id="btn-me" onclick="selectWho('me')">👨 我</button>
      <button class="toggle-btn" id="btn-wife" onclick="selectWho('wife')">👩 太太</button>
      <button class="toggle-btn" id="btn-both" onclick="selectWho('both')">👫 一起</button>
    </div>

    <div class="section-label">遛狗時段</div>
    <div class="time-toggle-group">
      <button class="time-btn morning active" id="time-morning" onclick="selectTime('morning')"><span class="t-icon">🌅</span>早上</button>
      <button class="time-btn evening" id="time-evening" onclick="selectTime('evening')"><span class="t-icon">🌆</span>傍晚</button>
      <button class="time-btn night" id="time-night" onclick="selectTime('night')"><span class="t-icon">🌙</span>晚上</button>
    </div>

    <div class="section-label">遛狗時間</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center;">
      <input type="time" id="walkTimeInput" style="flex:1;padding:10px 12px;border:2px solid var(--border);border-radius:12px;font-family:'Noto Sans TC',sans-serif;font-size:15px;color:var(--text);background:#fff;outline:none;">
      <button onclick="setNowTime()" style="padding:10px 14px;border:2px solid var(--amber);border-radius:12px;background:var(--amber-light);color:var(--amber-dark);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;">⏱ 現在時間</button>
    </div>

    <div class="section-label">尿尿了嗎？</div>
    <div class="toggle-group">
      <button class="toggle-btn active" id="pee-yes" onclick="selectPee(true)">💧 有</button>
      <button class="toggle-btn" id="pee-no" onclick="selectPee(false)">🚫 沒有</button>
    </div>

    <div class="section-label">便便了嗎？</div>
    <div class="toggle-group" style="margin-bottom:0">
      <button class="toggle-btn active" id="poop-yes" onclick="selectPoop(true)">💩 有</button>
      <button class="toggle-btn" id="poop-no" onclick="selectPoop(false)">🚫 沒有</button>
    </div>

    <div id="poopStatusSection" style="margin-top:12px;margin-bottom:16px">
      <div class="section-label">便便狀況</div>
      <div class="toggle-group">
        <button class="toggle-btn active" id="poop-normal" onclick="selectPoopStatus('normal')">✅ 正常</button>
        <button class="toggle-btn" id="poop-abnormal" onclick="selectPoopStatus('abnormal')">⚠️ 異常</button>
      </div>
    </div>

    <div class="section-label">備註（可留空）</div>
    <textarea class="note-input" id="noteInput" rows="2" placeholder="例：有點軟便、精神很好、吃了草..."></textarea>
    <button class="submit-btn" onclick="submitLog()">✅ 儲存紀錄</button>
  </div>

  <!-- Summary -->
  <div class="today-summary" id="todaySummary" style="display:none">
    <div class="summary-item pee-summary">
      <div class="summary-num" id="summaryPee">0</div>
      <div class="summary-label">💧 今日尿尿</div>
    </div>
    <div class="summary-item poop-summary">
      <div class="summary-num" id="summaryPoop">0</div>
      <div class="summary-label">💩 今日便便</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-today" onclick="switchTab('today')">今天</button>
    <button class="tab" id="tab-all" onclick="switchTab('all')">全部紀錄</button>
  </div>

  <div id="logList"></div>
</div>

<script>
const LOG_KEY = 'dogWalkLog_v2';
let logs = [];
let currentWho = 'me', walkTime = 'morning';
let hasPee = true, hasPoop = true, poopStatus = 'normal';
let currentTab = 'today';
let routeSequence = []; // [{id:'A', name:'狗狗公園'}, ...]

// ─── Firebase Storage ───
async function saveLog(entry) {
  await db.ref('logs/' + entry.id).set(entry);
}
async function deleteLogFromDB(id) {
  await db.ref('logs/' + id).remove();
}

function initData() {
  db.ref('logs').on('value', snap => {
    const data = snap.val() || {};
    logs = Object.values(data).sort((a,b) => b.id - a.id);
    render();
  });
}

// ─── Route Planner ───
function addPlace(id, name) {
  routeSequence.push({id, name});
  renderRouteSequence();
}
function clearRoute() {
  routeSequence = [];
  renderRouteSequence();
}
function renderRouteSequence() {
  const el = document.getElementById('routeSequence');
  if (routeSequence.length === 0) {
    el.innerHTML = '<span class="route-sequence-empty">點選上方地點來建立路線</span>';
    return;
  }
  el.innerHTML = routeSequence.map((p, i) =>
    `<span class="seq-chip">${p.id} ${p.name}</span>${i < routeSequence.length-1 ? '<span class="seq-arrow">→</span>' : ''}`
  ).join('');
}

// ─── GPS ───
// ─── Form ───
function setNowTime(){const n=new Date();document.getElementById('walkTimeInput').value=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}
function toggleForm(){const card=document.getElementById('formCard');card.classList.toggle('open');if(card.classList.contains('open'))setNowTime();}
function selectWho(w){currentWho=w;['me','wife','both'].forEach(x=>document.getElementById(`btn-${x}`).classList.toggle('active',x===w));}
function selectTime(t){walkTime=t;['morning','evening','night'].forEach(x=>document.getElementById(`time-${x}`).classList.toggle('active',x===t));}
function selectPee(v){hasPee=v;document.getElementById('pee-yes').classList.toggle('active',v);document.getElementById('pee-no').classList.toggle('active',!v);}
function selectPoop(v){hasPoop=v;document.getElementById('poop-yes').classList.toggle('active',v);document.getElementById('poop-no').classList.toggle('active',!v);document.getElementById('poopStatusSection').style.display=v?'block':'none';}
function selectPoopStatus(s){poopStatus=s;document.getElementById('poop-normal').classList.toggle('active',s==='normal');document.getElementById('poop-abnormal').classList.toggle('active',s==='abnormal');}
function switchTab(t){currentTab=t;['today','all'].forEach(x=>document.getElementById(`tab-${x}`).classList.toggle('active',x===t));renderList();}

// ─── Submit / Delete ───
async function submitLog(){
  const walkTimeStr=document.getElementById('walkTimeInput').value||'';
  const entry={
    id:Date.now(),who:currentWho,walkTime,walkTimeStr,
    pee:hasPee,poop:hasPoop,poopStatus:hasPoop?poopStatus:null,
    routePlaces: routeSequence.length>0 ? [...routeSequence] : null,
    note:document.getElementById('noteInput').value.trim(),
    time:new Date().toISOString()
  };
  await saveLog(entry);
  document.getElementById('noteInput').value='';
  document.getElementById('formCard').classList.remove('open');
}
async function deleteLog(id){await deleteLogFromDB(id);}

// ─── Render ───
const TL={morning:'🌅 早上',evening:'🌆 傍晚',night:'🌙 晚上'};
function todayStr(){return new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});}
function isToday(iso){return new Date(iso).toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'})===todayStr();}

function render(){
  document.getElementById('todayDate').textContent=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  const tl=logs.filter(l=>isToday(l.time));
  const tp=tl.filter(l=>l.pee).length, tc=tl.filter(l=>l.poop).length;
  ['headerPee','summaryPee'].forEach(id=>document.getElementById(id).textContent=tp);
  ['headerPoop','summaryPoop'].forEach(id=>document.getElementById(id).textContent=tc);
  document.getElementById('todaySummary').style.display=tl.length>0?'flex':'none';
  if(logs.length>0){
    const mins=Math.floor((Date.now()-new Date(logs[0].time))/60000);
    document.getElementById('lastUpdatedPill').textContent='🕐 '+(mins<1?'剛剛更新':mins<60?`${mins} 分鐘前`:`${Math.floor(mins/60)} 小時前`);
  }
  renderList();
}

function renderList(){
  const container=document.getElementById('logList');
  const filtered=currentTab==='today'?logs.filter(l=>isToday(l.time)):logs;
  if(filtered.length===0){container.innerHTML=`<div class="empty-state"><div class="big">🐾</div><p>${currentTab==='today'?'今天還沒有紀錄，快去遛狗吧！':'還沒有任何紀錄'}</p></div>`;return;}
  container.innerHTML=filtered.map(e=>{
    const d=new Date(e.time);
    const ts=d.toLocaleString('zh-TW',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const whoMap={me:{wc:'by-me',ac:'me',wl:'我帶出去',av:'我'},wife:{wc:'by-wife',ac:'wife',wl:'太太帶出去',av:'妻'},both:{wc:'by-both',ac:'both',wl:'一起出去',av:'我們'}};
    const {wc,ac,wl,av}=whoMap[e.who]||whoMap['me'];
    let badges=`<span class="badge ${e.walkTime}">${TL[e.walkTime]||''}</span>`;
    if(e.walkTimeStr)badges+=`<span class="badge" style="background:#F0FDF4;color:#065F46;font-weight:700;">🕐 ${e.walkTimeStr}</span>`;
    if(e.pee)badges+=`<span class="badge pee">💧 尿尿</span>`;
    if(e.poop){badges+=`<span class="badge poop">💩 便便</span>`;badges+=e.poopStatus==='normal'?`<span class="badge normal">✅ 正常</span>`:`<span class="badge abnormal">⚠️ 異常</span>`;}
    if(!e.pee&&!e.poop)badges+=`<span class="badge" style="background:#F5F5F4;color:#78716C">散步未排泄</span>`;
    const noteHtml=e.note?`<div class="entry-note">📝 ${e.note}</div>`:'';
    let routePlacesHtml='';
    if(e.routePlaces&&e.routePlaces.length>0){
      const chips=e.routePlaces.map((p,i)=>
        `<span class="seq-chip" style="font-size:11px;padding:3px 8px;">${p.id} ${p.name}</span>${i<e.routePlaces.length-1?'<span class="seq-arrow">→</span>':''}`
      ).join('');
      routePlacesHtml=`<div class="entry-route-sequence">📍 ${chips}</div>`;
    }
    return `<div class="log-entry ${wc}">
      <button class="delete-btn" onclick="deleteLog(${e.id})">🗑️</button>
      <div class="entry-header"><div class="entry-who"><div class="who-avatar ${ac}">${av}</div><span class="who-name">${wl}</span></div><span class="entry-time">${ts}</span></div>
      <div class="badge-row">${badges}</div>${routePlacesHtml}${noteHtml}
    </div>`;
  }).join('');
}

initData();
</script>
</body>
</html>
